<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce-SyntaxWear</title>
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/header.css" />
    <link rel="stylesheet" href="assets/css/hero.css" />
    <link rel="stylesheet" href="assets/css/product-category.css"/>
    <link rel="stylesheet" href="assets/css/featured-products.css"/>
  </head>

  <body>
    <header class="header">
      <!-- logo e navegação -->
      <h1 class="logo">
        <a href="/" title="Logo da loja SyntaxWear - Ecommerce de Tênis">
          <img
            src="./assets/images/logo/logo.svg"
            alt="Logo da loja SyntaxWear - Ecommerce de Tênis"
          />
        </a>
      </h1>
      <nav class="nav-center" aria-label="Categorias Principais">
        <ul class="nav-list">
          <li class="nav-item"><a href="#">Masculino</a></li>
          <li class="nav-item"><a href="#">Feminino</a></li>
          <li class="nav-item"><a href="#">Outlet</a></li>
        </ul>
      </nav>
      <nav class="nav-right" aria-label="Acesso rápido">
        <ul class="nav-right-list">
          <li class="nav-item"><a href="#">Nossas Lojas</a></li>
          <li class="nav-item"><a href="#">Sobre</a></li>
          <li class="nav-item">
            <a href="#" aria-label="Minha Conta">
              <img src="./assets/images/icons/user.svg" alt="Minha Conta"
            /></a>
          </li>
          <li class="nav-item">
            <a href="#" aria-label="Ajuda">
              <img src="./assets/images/icons/help.svg" alt="Ajuda"
            /></a>
          </li>

          <li class="nav-item">
            <a href="#" aria-label="Carrinho de Compras">
              <img
                src="./assets/images/icons/bag.svg"
                alt="Carrinho de Compras"
            /></a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero-section">
        <!-- seção hero -->
        <div class="hero-overlay">
          <div class="hero-content">
            <span class="hero-subtitle">Krypton One</span>
            <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
            <div class="hero-buttons">
              <a href="#" class="btn btn-outline">Ver Modelos</a>
              <a href="#" class="btn btn-filled">Comprar</a>
            </div>
          </div>
        </div>
      </section>

      <section class="categories-section">
        <!-- seção categorias de tênis -->
         
          <div class="category-card casual">
            <a href="#" class="category-links">
              <span class="overlay"></span>
              <span class="category-name btn btn-outline">Casual</span>
            </a>
          </div>

          <div class="category-card esporte">
            <a href="#" class="category-links">
              <span class="overlay"></span>
              <span class="category-name btn btn-outline">Esporte</span>
            </a>
          </div>
          <div class="category-card moderno">
            <a href="#" class="category-links">
              <span class="overlay"></span>
              <span class="category-name btn btn-outline">Moderno</span>
            </a>
          </div>

          <div class="category-card futurista">
            <a href="#" class="category-links">
              <span class="overlay"></span>
              <span class="category-name btn btn-outline ">Futurista</span>
            </a>
          </div>
    
         
      </section>
      <section class="featured-products">
        <!-- seção produtos em destaque -->
         <div class="card modeloM">
          <div class="modeloM-content">
            <h3 class="card-title">Kryton One</h3>
            <p class="card-subtitle">Explore os modelos mais recentes.</p>
            <div class="cta-group">
              <a href="#" class="btn btn-outline">Feminino</a>
              <a href="#" class="btn btn-outline">Masculino</a>
            </div>
          </div>
        </div>
         <div class="card modeloF"></div>
         <div class="card card1"></div>
         <div class="card card2"></div>
         <div class="card card3"></div>
         <div class="card card4"></div>
      </section>
    </main>

    <footer class="site-footer">
      <!-- Informações de contato, links para redes sociais e direitos autorais. -->
    </footer>
  </body>
</html>
